<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – PneumoAI</title>
    <meta name="description" content="Log in to PneumoAI to upload chest X-rays and get AI-powered pneumonia predictions.">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ==================== FLASH MESSAGES ==================== -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="flash-container">
    {% for category, message in messages %}
    <div class="flash-message flash-{{ category }}">
        <i class="bi bi-{% if category == 'success' %}check-circle-fill{% elif category == 'danger' %}exclamation-circle-fill{% elif category == 'warning' %}exclamation-triangle-fill{% else %}info-circle-fill{% endif %}"></i>
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}

<!-- ==================== LOGIN PAGE ==================== -->
<div class="auth-page">
    <div class="auth-card fade-in-up">

        <!-- Logo -->
        <div class="text-center mb-4">
            <a href="/" class="navbar-brand-custom" style="font-size:1.8rem; display:inline-flex;">
                <span class="brand-icon">🩺</span> PneumoAI
            </a>
        </div>

        <h2 class="text-center">Welcome Back</h2>
        <p class="auth-subtitle text-center">Log in to access your dashboard and predictions</p>

        <!-- Login Form -->
        <form action="/login" method="POST" id="loginForm">

            <!-- Email -->
            <div class="form-floating-custom">
                <label for="email">
                    <i class="bi bi-envelope me-1"></i> Email Address
                </label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       placeholder="you@example.com"
                       required>
            </div>

            <!-- Password -->
            <div class="form-floating-custom">
                <label for="password">
                    <i class="bi bi-lock me-1"></i> Password
                </label>
                <div class="position-relative">
                    <input type="password"
                           class="form-control"
                           id="password"
                           name="password"
                           placeholder="Enter your password"
                           required
                           minlength="6">
                    <button type="button"
                            class="btn btn-link position-absolute end-0 top-50 translate-middle-y pe-3"
                            style="text-decoration:none; color:var(--text-secondary);"
                            onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-gradient w-100 mt-3 py-3">
                <i class="bi bi-box-arrow-in-right me-2"></i> Log In
            </button>

        </form>

        <!-- Sign Up Link -->
        <div class="auth-divider">
            Don't have an account? <a href="/register">Create one</a>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-3">
            <a href="/" style="color: var(--text-secondary); font-size: 0.88rem;">
                <i class="bi bi-arrow-left me-1"></i> Back to Home
            </a>
        </div>

    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Toggle password visibility
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.className = 'bi bi-eye-slash';
        } else {
            passwordInput.type = 'password';
            toggleIcon.className = 'bi bi-eye';
        }
    }

    // Auto-dismiss flash messages
    setTimeout(() => {
        document.querySelectorAll('.flash-message').forEach(el => {
            el.style.transition = 'opacity 0.5s ease';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 4000);
</script>

</body>
</html>
